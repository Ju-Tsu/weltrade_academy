<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Weltrade Academy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    button { -webkit-tap-highlight-color: transparent; }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- EN modules (default) -->
  <script src="mod01.js"></script>
  <script src="mod02.js"></script>
  <script src="mod03.js"></script>
  <script src="mod04.js"></script>
  <script src="mod05.js"></script>

  <!-- ES modules -->
  <script src="mod01_es.js"></script>
  <script src="mod02_es.js"></script>
  <script src="mod03_05_es.js"></script>

  <!-- PT-BR modules -->
  <script src="mod01_pt.js"></script>
  <script src="mod02_05_pt.js"></script>

  <!-- i18n: language detection + UI translations. Load AFTER modules -->
  <script src="i18n.js"></script>

  <!-- Influencer promo codes — only file to edit when adding influencers -->
  <script src="promo_config.js"></script>

  <!-- Analytics -->
  <script src="analytics.js"></script>

  <!-- Engine always last -->
  <script src="engine.js"></script>
</body>
</html>
